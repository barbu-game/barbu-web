name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Regenerate the API client from the committed contract; fail if it drifts.
      - run: pnpm gen:api
      - run: git diff --exit-code app/lib/api
      - run: pnpm lint
      - run: pnpm build
