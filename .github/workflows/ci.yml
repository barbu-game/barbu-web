name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        env:
          # PAT with read:packages — GITHUB_TOKEN can't read a private package
          # owned by another repo in the org. Stored as a repo secret.
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN }}
      # The contract lives in the pinned @barbu-game/barbu-api; next build typechecks
      # against it, so any drift from the server's published types fails the build.
      - run: pnpm lint
      - run: pnpm build
