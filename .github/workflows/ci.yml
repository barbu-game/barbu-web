name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      # PAT with read:packages — GITHUB_TOKEN can't read a private package owned by another
      # repo in the org. Recent pnpm refuses to expand env vars in a committed project .npmrc,
      # so the credential is injected into the user-level config, which pnpm still trusts.
      - run: pnpm config set "//npm.pkg.github.com/:_authToken" "$NODE_AUTH_TOKEN"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN }}
      - run: pnpm install --frozen-lockfile
      # The contract lives in the pinned @barbu-game/barbu-api; next build typechecks
      # against it, so any drift from the server's published types fails the build.
      - run: pnpm lint
      - run: pnpm build
