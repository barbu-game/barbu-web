name: E2E

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout web
        uses: actions/checkout@v6
        with:
          path: barbu-web

      # Repo serveur privé, frère sur le disque pour que ../barbu-server résolve.
      - name: Checkout server
        uses: actions/checkout@v6
        with:
          repository: barbu-game/barbu-server
          path: barbu-server
          token: ${{ secrets.SERVER_REPO_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: barbu-web/pnpm-lock.yaml

      # PAT read:packages — le GITHUB_TOKEN ne lit pas le package privé @barbu-game/barbu-api.
      - name: Auth to GitHub Packages
        working-directory: barbu-web
        run: pnpm config set "//npm.pkg.github.com/:_authToken" "$NODE_AUTH_TOKEN"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN }}

      - name: Install web deps
        working-directory: barbu-web
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: barbu-web
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E
        working-directory: barbu-web
        run: pnpm test:e2e

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: barbu-web/playwright-report
          retention-days: 7
